<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOF Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <style>
        body {
            background-color: #0D1117;
            color: #E6EDF3;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .card {
            background-color: #161B22;
            border: 1px solid #30363D;
            border-radius: 6px;
        }
        .badge-sube { color: #58A6FF; }
        .badge-baja { color: #FF7B72; }
        .badge-neutral { color: #8B949E; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="area-reporte" class="max-w-6xl mx-auto p-4 bg-[#0D1117] rounded-xl">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-[#30363D] pb-4 mb-6 gap-4">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📊</span>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-[#F0F6FC]">DOF Monitor</h1>
                    <p class="text-xs text-[#8B949E]" id="fecha-consulta">Cargando estado del sistema...</p>
                </div>
            </div>
            <div class="flex gap-2 data-html2canvas-ignore="true"">
                <button id="btn-descargar" onclick="capturarPantallaCompleta()" class="bg-[#21262D] hover:bg-[#30363D] text-[#C9D1D9] border border-[#30363D] font-medium text-sm px-4 py-2 rounded transition-colors duration-200 cursor-pointer flex items-center gap-2">
                    📸 Descargar Reporte
                </button>
                <button id="btn-actualizar" onclick="consultarAPI(true)" class="bg-[#238636] hover:bg-[#2EA043] text-white font-medium text-sm px-4 py-2 rounded transition-colors duration-200 cursor-pointer">
                    Actualizar
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="card p-4 flex flex-col justify-between min-h-[110px]">
                <div>
                    <p class="text-xs font-semibold text-[#8B949E] uppercase tracking-wider flex items-center gap-1">
                        <span>💱</span> Tipo de Cambio
                    </p>
                    <h2 class="text-2xl font-bold mt-1 text-[#F0F6FC]" id="val-tc">--</h2>
                </div>
                <p class="text-xs font-mono mt-2" id="var-tc">--</p>
            </div>

            <div class="card p-4 flex flex-col justify-between min-h-[110px]">
                <div>
                    <p class="text-xs font-semibold text-[#8B949E] uppercase tracking-wider flex items-center gap-1">
                        <span class="text-[#3FB950]">🛢️</span> Magna
                    </p>
                    <h2 class="text-2xl font-bold mt-1 text-[#F0F6FC]" id="val-regular">--</h2>
                </div>
                <p class="text-xs font-mono mt-2" id="var-regular">--</p>
            </div>

            <div class="card p-4 flex flex-col justify-between min-h-[110px]">
                <div>
                    <p class="text-xs font-semibold text-[#8B949E] uppercase tracking-wider flex items-center gap-1">
                        <span class="text-[#FF7B72]">🛢️</span> Premium
                    </p>
                    <h2 class="text-2xl font-bold mt-1 text-[#F0F6FC]" id="val-premium">--</h2>
                </div>
                <p class="text-xs font-mono mt-2" id="var-premium">--</p>
            </div>

            <div class="card p-4 flex flex-col justify-between min-h-[110px]">
                <div>
                    <p class="text-xs font-semibold text-[#8B949E] uppercase tracking-wider flex items-center gap-1">
                        <span class="text-[#FFFFFF]">🛢️</span> Diésel
                    </p>
                    <h2 class="text-2xl font-bold mt-1 text-[#F0F6FC]" id="val-diesel">--</h2>
                </div>
                <p class="text-xs font-mono mt-2" id="var-diesel">--</p>
            </div>
        </div>

        <main class="card p-4 min-h-[400px] flex flex-col justify-center relative">
            <div id="loading-overlay" class="absolute inset-0 bg-[#0D1117]/80 flex flex-col items-center justify-center gap-3 z-10 rounded">
                <div class="animate-spin rounded-full h-10 w-10 border-4 border-[#30363D] border-t-[#58A6FF]"></div>
                <p class="text-sm text-[#8B949E]" id="loading-text">Consultando información del Diario Oficial de la Federación...</p>
            </div>
            
            <div id="contenedor-grafica" class="w-full"></div>
        </main>
    </div>

    <script>
        function mapearEstiloVariacion(elementoId, variacion) {
            const el = document.getElementById(elementoId);
            if (!variacion) {
                el.className = "text-xs font-mono mt-2 badge-neutral";
                el.innerText = "--";
                return;
            }
            
            el.innerText = variacion.texto;
            if (variacion.tipo === "sube") {
                el.className = "text-xs font-mono mt-2 badge-sube";
            } else if (variacion.tipo === "baja") {
                el.className = "text-xs font-mono mt-2 badge-baja";
            } else {
                el.className = "text-xs font-mono mt-2 badge-neutral";
            }
        }

        function consultarAPI(forzarActualizacion = false) {
            const overlay = document.getElementById('loading-overlay');
            const btn = document.getElementById('btn-actualizar');
            const btnDesc = document.getElementById('btn-descargar');
            
            overlay.classList.remove('hidden');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            if(btnDesc) btnDesc.disabled = true;

            const url = forzarActualizacion ? '/api/consultar?force=true' : '/api/consultar';

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('fecha-consulta').innerText = 
                        `Sincronización: ${data.fecha_consulta} ${data.desde_cache ? '(Caché de sesión)' : '(Actualizado ahora)'}`;

                    if (data.tipo_cambio) {
                        document.getElementById('val-tc').innerText = `$${data.tipo_cambio.valor.toFixed(4)}`;
                        mapearEstiloVariacion('var-tc', data.tipo_cambio.variacion);
                    }

                    if (data.ieps) {
                        if (data.ieps.regular) {
                            document.getElementById('val-regular').innerText = `$${data.ieps.regular.valor.toFixed(4)}`;
                            mapearEstiloVariacion('var-regular', data.ieps.regular.variacion);
                        }
                        if (data.ieps.premium) {
                            document.getElementById('val-premium').innerText = `$${data.ieps.premium.valor.toFixed(4)}`;
                            mapearEstiloVariacion('var-premium', data.ieps.premium.variacion);
                        }
                        if (data.ieps.diesel) {
                            document.getElementById('val-diesel').innerText = `$${data.ieps.diesel.valor.toFixed(4)}`;
                            mapearEstiloVariacion('var-diesel', data.ieps.diesel.variacion);
                        }
                    }

                    if (data.grafica) {
                        const esquemaGrafica = JSON.parse(data.grafica);
                        
                        const config = {
                            responsive: true,
                            displayModeBar: true,
                            displaylogo: false,
                            modeBarButtonsToRemove: ['select2d', 'lasso2d', 'autoScale2d']
                        };
                        
                        Plotly.newPlot('contenedor-grafica', esquemaGrafica.data, esquemaGrafica.layout, config);
                    }
                })
                .catch(error => {
                    console.error('Error al consultar la API:', error);
                    document.getElementById('fecha-consulta').innerText = "Error crítico al sincronizar con el backend.";
                })
                .finally(() => {
                    overlay.classList.add('hidden');
                    btn.disabled = false;
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    if(btnDesc) btnDesc.disabled = false;
                });
        }

        // =============================================================
        // FUNCIÓN DE CAPTURA PANORÁMICA COMPLETA (DATOS + GRÁFICAS)
        // =============================================================
        function capturarPantallaCompleta() {
            const nodo = document.getElementById('area-reporte');
            const btnDescargar = document.getElementById('btn-descargar');
            const btnActualizar = document.getElementById('btn-actualizar');
            
            btnDescargar.innerText = "📸 Capturando...";
            btnDescargar.disabled = true;

            // Ocultamos temporalmente los botones de la foto para que se vea un reporte profesional
            btnDescargar.style.visibility = 'hidden';
            btnActualizar.style.visibility = 'hidden';

            // Opciones de renderizado de alta calidad para dom-to-image
            const opciones = {
                style: {
                    'transform': 'scale(1)',
                    'transform-origin': 'top left'
                },
                bgcolor: '#0D1117'
            };

            domtoimage.toPng(nodo, opciones)
                .then(function (dataUrl) {
                    const enlace = document.createElement('a');
                    const hoy = new Date().toISOString().slice(0,10);
                    enlace.download = `DOF_Monitor_Completo_${hoy}.png`;
                    enlace.href = dataUrl;
                    enlace.click();
                    
                    // Restauramos los controles
                    btnDescargar.style.visibility = 'visible';
                    btnActualizar.style.visibility = 'visible';
                    btnDescargar.innerText = "📸 Descargar Reporte";
                    btnDescargar.disabled = false;
                })
                .catch(function (error) {
                    console.error('Error al generar la imagen del reporte:', error);
                    btnDescargar.style.visibility = 'visible';
                    btnActualizar.style.visibility = 'visible';
                    btnDescargar.innerText = "❌ Error al capturar";
                    btnDescargar.disabled = false;
                });
        }

        window.addEventListener('DOMContentLoaded', () => {
            consultarAPI(false);
        });
    </script>
</body>
</html>
