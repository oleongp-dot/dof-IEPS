<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOF Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            background-color: #0D1117;
            color: #E6EDF3;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .card {
            background-color: #161B22;
            border: 1px solid #30363D;
            border-radius: 6px;
        }
        .badge-sube { color: #58A6FF; }
        .badge-baja { color: #FF7B72; }
        .badge-neutral { color: #8B949E; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="area-reporte" class="max-w-6xl mx-auto p-4 bg-[#0D1117] rounded-xl">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-[#30363D] pb-4 mb-6 gap-4">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📊</span>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-[#F0F6FC]">DOF Monitor</h1>
                    <p class="text-[10px] text-[#8B949E] uppercase tracking-widest" id="fecha-consulta">Sincronizando...</p>
                </div>
            </div>
            <div class="flex gap-2" id="controles-principales">
                <button id="btn-screenshot" onclick="generarCapturaSegura()" class="bg-[#21262D] hover:bg-[#30363D] text-[#C9D1D9] border border-[#30363D] font-medium text-xs px-3 py-2 rounded transition flex items-center gap-2">
                    📸 Reporte (PNG)
                </button>
                <button id="btn-actualizar" onclick="consultarAPI(true)" class="bg-[#238636] hover:bg-[#2EA043] text-white font-medium text-xs px-3 py-2 rounded transition">
                    Actualizar
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="card p-4 flex flex-col justify-between min-h-[110px]">
                <div>
                    <p class="text-[10px] font-semibold text-[#8B949E] uppercase tracking-wider">💱 Tipo de Cambio</p>
                    <h2 class="text-2xl font-bold mt-1 text-[#F0F6FC]" id="val-tc">--</h2>
                </div>
                <p class="text-xs font-mono mt-2" id="var-tc">--</p>
            </div>

            <div class="card p-4 flex flex-col justify-between min-h-[110px]">
                <div>
                    <p class="text-[10px] font-semibold text-[#8B949E] uppercase tracking-wider">🛢️ Regular (<91 OCT)</p>
                    <div class="flex items-baseline gap-2 mt-1">
                        <h2 class="text-2xl font-bold text-[#F0F6FC]" id="val-regular">--</h2>
                        <span class="text-[10px] font-semibold text-[#8B949E]" id="cpg-regular"></span>
                    </div>
                </div>
                <p class="text-xs font-mono mt-2" id="var-regular">--</p>
            </div>

            <div class="card p-4 flex flex-col justify-between min-h-[110px]">
                <div>
                    <p class="text-[10px] font-semibold text-[#8B949E] uppercase tracking-wider">🛢️ Premium</p>
                    <div class="flex items-baseline gap-2 mt-1">
                        <h2 class="text-2xl font-bold text-[#F0F6FC]" id="val-premium">--</h2>
                        <span class="text-[10px] font-semibold text-[#8B949E]" id="cpg-premium"></span>
                    </div>
                </div>
                <p class="text-xs font-mono mt-2" id="var-premium">--</p>
            </div>

            <div class="card p-4 flex flex-col justify-between min-h-[110px]">
                <div>
                    <p class="text-[10px] font-semibold text-[#8B949E] uppercase tracking-wider">🛢️ Diésel</p>
                    <div class="flex items-baseline gap-2 mt-1">
                        <h2 class="text-2xl font-bold text-[#F0F6FC]" id="val-diesel">--</h2>
                        <span class="text-[10px] font-semibold text-[#8B949E]" id="cpg-diesel"></span>
                    </div>
                </div>
                <p class="text-xs font-mono mt-2" id="var-diesel">--</p>
            </div>
        </div>

        <div class="flex justify-end gap-2 mb-4 border-b border-[#30363D] pb-3" id="controles-csv">
            <span class="text-[10px] text-[#8B949E] self-center mr-2 font-bold uppercase">Descargar Datos Crudos:</span>
            <button onclick="descargarCSV('tc')" class="text-[#8B949E] hover:text-[#E6EDF3] text-[10px] border border-[#30363D] px-2 py-1 rounded transition flex items-center gap-1">
                📥 TC (.csv)
            </button>
            <button onclick="descargarCSV('ieps')" class="text-[#8B949E] hover:text-[#E6EDF3] text-[10px] border border-[#30363D] px-2 py-1 rounded transition flex items-center gap-1">
                📥 IEPS (.csv)
            </button>
        </div>

        <main id="bloque-grafica" class="card p-4 min-h-[400px] flex flex-col justify-center relative">
            <div id="loading-overlay" class="absolute inset-0 bg-[#0D1117]/80 flex flex-col items-center justify-center gap-3 z-10 rounded">
                <div class="animate-spin rounded-full h-8 w-8 border-4 border-[#30363D] border-t-[#58A6FF]"></div>
                <p class="text-xs text-[#8B949E]">Consultando Diario Oficial...</p>
            </div>
            <div id="contenedor-grafica" class="w-full"></div>
        </main>
    </div>

    <script>
        let cacheLocalRaw = null;

        function mapearEstiloVariacion(elementoId, variacion) {
            const el = document.getElementById(elementoId);
            if (!variacion) {
                el.className = "text-xs font-mono mt-2 badge-neutral";
                el.innerText = "--";
                return;
            }
            el.innerText = variacion.texto;
            if (variacion.tipo === "sube") {
                el.className = "text-xs font-mono mt-2 badge-sube";
            } else if (variacion.tipo === "baja") {
                el.className = "text-xs font-mono mt-2 badge-baja";
            } else {
                el.className = "text-xs font-mono mt-2 badge-neutral";
            }
        }

        function calcularEInyectarCPG(elementoId, valorMxnLitro, tipoCambio) {
            if (valorMxnLitro && tipoCambio && tipoCambio > 0) {
                const cpg = (valorMxnLitro / tipoCambio) * 3.78541 * 100;
                document.getElementById(elementoId).innerText = `/ ${cpg.toFixed(1)} cpg`;
            }
        }

        function calcularVariacionCPG(elementoId, variacionObjeto, tipoCambio) {
            const el = document.getElementById(elementoId);
            if (!variacionObjeto || !variacionObjeto.texto || !tipoCambio || tipoCambio <= 0) return;
            if (variacionObjeto.tipo === "neutral") return;

            const coincidencia = variacionObjeto.texto.match(/[0-9.]+/);
            if (coincidencia) {
                const valorMxn = parseFloat(coincidencia[0]);
                const cpgVar = (valorMxn / tipoCambio) * 3.78541 * 100;
                const signo = variacionObjeto.tipo === "sube" ? "+" : "-";
                el.innerText = `${variacionObjeto.texto} (${signo}${cpgVar.toFixed(1)} cpg)`;
            }
        }

        async function consultarAPI(forzar = false) {
            const overlay = document.getElementById('loading-overlay');
            const btnAct = document.getElementById('btn-actualizar');
            
            overlay.classList.remove('hidden');
            btnAct.disabled = true;

            try {
                const url = forzar ? '/api/consultar?force=true' : '/api/consultar';
                const res = await fetch(url);
                const data = await res.json();
                cacheLocalRaw = data;

                document.getElementById('fecha-consulta').innerText = 
                    `Sincronización: ${data.fecha_consulta} ${data.desde_cache ? '(Caché)' : '(Vivo)'}`;

                let tcActual = 0;
                if (data.tipo_cambio) {
                    tcActual = data.tipo_cambio.valor;
                    document.getElementById('val-tc').innerText = `$${tcActual.toFixed(4)}`;
                    mapearEstiloVariacion('var-tc', data.tipo_cambio.variacion);
                }

                if (data.ieps) {
                    const fuels = ['regular', 'premium', 'diesel'];
                    fuels.forEach(f => {
                        if (data.ieps[f]) {
                            document.getElementById(`val-${f}`).innerText = `$${data.ieps[f].valor.toFixed(4)}`;
                            mapearEstiloVariacion(`var-${f}`, data.ieps[f].variacion);
                            calcularEInyectarCPG(`cpg-${f}`, data.ieps[f].valor, tcActual);
                            calcularVariacionCPG(`var-${f}`, data.ieps[f].variacion, tcActual);
                        }
                    });
                }

                if (data.grafica) {
                    const config = { responsive: true, displayModeBar: true, displaylogo: false };
                    Plotly.newPlot('contenedor-grafica', JSON.parse(data.grafica).data, JSON.parse(data.grafica).layout, config);
                }
            } catch (e) {
                console.error(e);
            } finally {
                overlay.classList.add('hidden');
                btnAct.disabled = false;
            }
        }

        // CAPTURA DE PANTALLA PANORÁMICA BLINDADA
        function generarCapturaSegura() {
            const nodeGraf = document.getElementById('contenedor-grafica');
            const bloqueGraf = document.getElementById('bloque-grafica');
            const btnScr = document.getElementById('btn-screenshot');

            btnScr.innerText = "📸 Capturando...";
            btnScr.disabled = true;

            Plotly.toImage(nodeGraf, { format: 'png', height: 700, width: 1100, scale: 2 })
                .then(dataUrl => {
                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.className = "w-full h-auto";

                    const backup = nodeGraf;
                    bloqueGraf.innerHTML = '';
                    bloqueGraf.appendChild(img);

                    // Ocultar botones para la foto
                    document.getElementById('controles-principales').style.visibility = 'hidden';
                    document.getElementById('controles-csv').style.visibility = 'hidden';

                    html2canvas(document.getElementById('area-reporte'), { backgroundColor: '#0D1117', scale: 2 })
                    .then(canvas => {
                        const link = document.createElement('a');
                        link.download = `Reporte_DOF_${new Date().toISOString().slice(0,10)}.png`;
                        link.href = canvas.toDataURL();
                        link.click();

                        bloqueGraf.innerHTML = '';
                        bloqueGraf.appendChild(backup);
                        document.getElementById('controles-principales').style.visibility = 'visible';
                        document.getElementById('controles-csv').style.visibility = 'visible';
                        btnScr.innerText = "📸 Reporte (PNG)";
                        btnScr.disabled = false;
                    });
                });
        }

        // DESCARGA CSV (DATOS CRUDOS)
        function descargarCSV(tipo) {
            if (!cacheLocalRaw || !cacheLocalRaw.historico_raw) return alert("Cargando datos...");
            const raw = cacheLocalRaw.historico_raw;
            let csv = "\ufeff";
            let filename = "";

            if (tipo === 'tc') {
                csv += "Fecha,Tipo de Cambio USD/MXN\n";
                filename = "dof_tc_historico.csv";
                raw.fechas_tc.forEach((f, i) => csv += `${f},${raw.valores_tc[i]}\n`);
            } else {
                csv += "Fecha,Regular,Premium,Diesel\n";
                filename = "dof_ieps_historico.csv";
                raw.fechas_ieps.forEach((f, i) => csv += `${f},${raw.vals_regular[i]},${raw.vals_premium[i]},${raw.vals_diesel[i]}\n`);
            }

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }

        window.onload = () => consultarAPI(false);
    </script>
</body>
</html>
